<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treat Trader - 首頁</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .hero-slider:hover { transform: scale(1.01); }

        @keyframes coolShow {
            from { 
                opacity: 0; 
                transform: translateY(30px) scale(0.9); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }

        #recommendList .card {
            display: flex;
            flex-direction: column;
            align-items: center;    /* 讓圖片與文字水平居中 */
            justify-content: center;
            text-align: center;     /* 確保多行文字也居中 */
            padding: 20px;
        }

        #recommendList .img-placeholder {
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <div class="marquee-container">✨ Treat Trader 新年回饋祭：各國零食滿 $2500 免運！ ✨</div>

    <header>
        <div class="logo" onclick="location.href='index.html'">
            <img src="assets/images/Logo.PNG" alt="Logo">
            Treat Trader
        </div>

        <nav class="main-nav">
            <a href="index.html">首頁</a>
            <a href="allgoods.html">商品總覽</a>
            <a href="member.html">會員資料</a>
            <a href="team.html">關於我們</a>
        </nav>

        <div class="header-icons">
            <a href="cart.html"><i class="fa-solid fa-cart-shopping"></i></a>
            <a href="login.html" id="avatarLink"><i class="fa-solid fa-circle-user"></i></a>
        </div>
    </header>

    <div class="container">
        <div class="hero-slider" id="heroSlider" onclick="clickAd()">
            <div class="slide-content" id="heroText"> Treat Trader：不出國也能吃遍世界！ </div>
        </div>

        <h2>熱門推薦商品</h2>
        <div id="recommendList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px;"></div>
    </div>

    <div class="scroll-top" onclick="window.scrollTo(0,0)">TOP</div>

    <footer>
        <div class="footer-socials">
            <a href="https://reurl.cc/xKA8ae" target="_blank">
                <i class="fa-brands fa-instagram"></i></a>
            <a href="https://reurl.cc/Vmlo9A" target="_blank">
                <i class="fa-brands fa-threads"></i></a>
            <a href="https://reurl.cc/9ba94j" target="_blank">
                <i class="fa-brands fa-line"></i></a>
            <a href="mailto:service@example.com">
                <i class="fa-solid fa-envelope"></i></a>
        </div>
        <div class="footer-links"><a href="help.html">幫助中心</a> | <a href="question.html">常見問題</a></div>
        <p class="copyright">© COPYRIGHT 807dorm</p>
    </footer>
    
    <script src="assets/js/index.js"></script>
</body>
</html>
